name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Node ${{ matrix.node }} / ${{ matrix.dependencies }} peers
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - node: 22.13.0
            dependencies: minimum
          - node: 22
            dependencies: latest
          - node: 24
            dependencies: latest
          - node: 25
            dependencies: latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install latest supported dependencies
        if: matrix.dependencies == 'latest'
        run: npm install --no-package-lock '@next/eslint-plugin-next@>=16.0.0 <17.0.0'

      - name: Install minimum supported dependencies
        if: matrix.dependencies == 'minimum'
        run: |
          npm install --no-save --no-package-lock \
            '@eslint/js@10.0.1' \
            '@eslint-react/eslint-plugin@5.16.1' \
            '@next/eslint-plugin-next@16.0.0' \
            'eslint@10.0.1' \
            'eslint-config-prettier@10.1.0' \
            'eslint-plugin-import-x@4.17.1' \
            'eslint-plugin-jsx-a11y-x@0.2.0' \
            'eslint-plugin-prettier@5.5.6' \
            'eslint-plugin-react-hooks@7.1.1' \
            'eslint-plugin-react-refresh@0.5.3' \
            'eslint-plugin-simple-import-sort@13.0.0' \
            'eslint-plugin-unused-imports@4.4.1' \
            'globals@17.7.0' \
            'prettier@3.9.5' \
            'typescript@6.0.2' \
            'typescript-eslint@8.64.0'

      - name: Test
        run: npm test
